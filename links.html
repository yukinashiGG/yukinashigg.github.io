<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | ユキナシ</title>
    <meta name="description" content="ユキナシ（Live2D・イラスト・3Dキャラクターモデリング）のリンク集。HP・Pixiv・お見積りフォームなど。">
    <!-- OGP -->
    <meta property="og:title" content="Links | ユキナシ">
    <meta property="og:description" content="HP・Pixiv・お見積りフォーム等のリンク集">
    <meta property="og:image" content="https://yukinashigg.github.io/ogp.jpg">
    <meta property="og:url" content="https://yukinashigg.github.io/links.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ユキナシ">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@yukinashi_gg">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fefcfd;
            --bg-secondary: #fdf2f8;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #64648c;
            --text-muted: #9ca3af;
            --accent-pink: #ec4899;
            --accent-purple: #8b5cf6;
            --accent-pink-pale: #fce7f3;
            --gradient-main: linear-gradient(135deg, #f9a8d4, #db2777);
            --gradient-bg: linear-gradient(180deg, #fdf2f8 0%, #ede9fe 100%);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(236, 72, 153, 0.18);
            --shadow-glow: 0 8px 30px rgba(236, 72, 153, 0.3);
            --border-card: rgba(236, 72, 153, 0.12);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', 'Inter', sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Profile Header */
        .profile {
            text-align: center;
            margin-bottom: 36px;
        }
        .profile__avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 18px;
            overflow: hidden;
            box-shadow: var(--shadow-glow);
            border: 4px solid white;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .profile__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile__name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }
        .profile__tagline {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .profile__credentials {
            margin-top: 12px;
            display: inline-block;
            padding: 4px 14px;
            background: var(--accent-pink-pale);
            color: var(--accent-pink);
            font-size: 0.72rem;
            font-weight: 600;
            border-radius: 100px;
            letter-spacing: 0.03em;
        }

        /* Links List */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.25s ease;
            box-shadow: var(--shadow-soft);
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-pink);
        }
        .link-card__icon {
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 12px;
            flex-shrink: 0;
        }
        .link-card__text {
            flex: 1;
            min-width: 0;
        }
        .link-card__title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .link-card__detail {
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .link-card__arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: transform 0.25s ease;
        }
        .link-card:hover .link-card__arrow {
            transform: translateX(4px);
            color: var(--accent-pink);
        }

        /* Button styled as link-card */
        button.link-card {
            width: 100%;
            font-family: inherit;
            text-align: left;
            color: inherit;
            cursor: pointer;
        }

        /* Featured (HP) link */
        .link-card--featured {
            background: var(--gradient-main);
            color: white;
            border: none;
            box-shadow: var(--shadow-glow);
        }
        .link-card--featured:hover {
            border-color: transparent;
        }
        .link-card--featured .link-card__icon {
            background: rgba(255,255,255,0.25);
        }
        .link-card--featured .link-card__detail {
            color: rgba(255,255,255,0.95);
        }
        .link-card--featured .link-card__arrow {
            color: white;
        }
        .link-card--featured:hover .link-card__arrow {
            color: white;
        }

        /* Section divider */
        .section-divider {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.1em;
            margin: 20px 0 4px 4px;
            text-transform: uppercase;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 24px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .footer p { margin-bottom: 4px; }
        .footer a {
            color: var(--accent-pink);
            text-decoration: none;
        }

        @media (max-width: 480px) {
            body { padding: 32px 16px; }
            .profile__avatar { width: 90px; height: 90px; }
            .profile__name { font-size: 1.3rem; }
            .link-card { padding: 14px 16px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="profile">
            <div class="profile__avatar">
                <img src="avatar.png" alt="ユキナシ" onerror="this.style.display='none';this.parentElement.textContent='🎨';">
            </div>
            <div class="profile__name">ユキナシ</div>
            <div class="profile__tagline">Live2D × イラスト × 3Dキャラクターモデリング</div>
        </div>

        <div class="section-divider">▼ メイン</div>
        <div class="links">

            <a href="https://yukinashigg.github.io/" class="link-card link-card--featured">
                <div class="link-card__icon">🌐</div>
                <div class="link-card__text">
                    <div class="link-card__title">公式HP</div>
                    <div class="link-card__detail">料金プラン・制作実績・ご依頼方法</div>
                </div>
                <div class="link-card__arrow">→</div>
            </a>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSe8mKLfx8Y5IplEBcbJEgE9H2bsJQ4C1s2NGm_ydCw9VTT16w/viewform" target="_blank" rel="noopener" class="link-card">
                <div class="link-card__icon">📋</div>
                <div class="link-card__text">
                    <div class="link-card__title">お見積りフォーム</div>
                    <div class="link-card__detail">Google Forms で受付中</div>
                </div>
                <div class="link-card__arrow">→</div>
            </a>

            <button type="button" class="link-card link-card--button" onclick="copyEmail(this)">
                <div class="link-card__icon">✉️</div>
                <div class="link-card__text">
                    <div class="link-card__title">メール（タップでコピー）</div>
                    <div class="link-card__detail">yukinashi.contact@gmail.com</div>
                    <div style="font-size: 0.72rem; color: var(--accent-pink); margin-top: 6px; white-space: normal; line-height: 1.5;">ご相談・お見積りもこちらからお気軽にどうぞ</div>
                </div>
                <div class="link-card__arrow">📋</div>
            </button>

        </div>

        <div class="section-divider">▼ 作品 / SNS</div>
        <div class="links">

            <a href="https://www.pixiv.net/users/51005118" target="_blank" rel="noopener" class="link-card">
                <div class="link-card__icon">🎨</div>
                <div class="link-card__text">
                    <div class="link-card__title">Pixiv</div>
                    <div class="link-card__detail">イラスト作品集</div>
                </div>
                <div class="link-card__arrow">→</div>
            </a>

            <a href="https://x.com/yukinashi_gg" target="_blank" rel="noopener" class="link-card">
                <div class="link-card__icon" style="font-weight:700;">𝕏</div>
                <div class="link-card__text">
                    <div class="link-card__title">X（メイン）</div>
                    <div class="link-card__detail">@yukinashi_gg</div>
                </div>
                <div class="link-card__arrow">→</div>
            </a>

            <a href="https://x.com/yukinashGG_sub" target="_blank" rel="noopener" class="link-card">
                <div class="link-card__icon" style="font-weight:700;">𝕏</div>
                <div class="link-card__text">
                    <div class="link-card__title">X（Live2Dサブ）</div>
                    <div class="link-card__detail">@yukinashGG_sub</div>
                </div>
                <div class="link-card__arrow">→</div>
            </a>

        </div>

        <div class="footer">
            <p>© 2026 ユキナシ（イラスト × Live2D）</p>
            <p><a href="terms.html">利用規約</a></p>
        </div>

    </div>

    <script>
        function copyEmail(btn) {
            const titleEl = btn.querySelector('.link-card__title');
            const arrowEl = btn.querySelector('.link-card__arrow');
            const originalTitle = titleEl.textContent;
            const originalArrow = arrowEl.textContent;
            navigator.clipboard.writeText('yukinashi.contact@gmail.com').then(() => {
                titleEl.textContent = '✅ コピーしました！';
                arrowEl.textContent = '✓';
                setTimeout(() => {
                    titleEl.textContent = originalTitle;
                    arrowEl.textContent = originalArrow;
                }, 2000);
            }).catch(() => {
                alert('コピーに失敗しました。手動でコピーしてください: yukinashi.contact@gmail.com');
            });
        }
    </script>

</body>
</html>
